<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local OBJ Viewer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0f14;
      color: #e6edf3;
      font-family: Arial, sans-serif;
    }

    #banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: #111827;
      color: #d1d5db;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 600;
      z-index: 20;
      border-bottom: 1px solid #1f2937;
    }

    #ui {
      position: absolute;
      top: 52px;
      left: 12px;
      z-index: 10;
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 12px;
      min-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui h1 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    #dropZone {
      border: 2px dashed #4b5563;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
      margin-bottom: 10px;
      background: rgba(255,255,255,0.02);
    }

    #dropZone.dragover {
      border-color: #60a5fa;
      background: rgba(96,165,250,0.08);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    button, input[type="file"]::file-selector-button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button.secondary {
      background: #374151;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-top: 8px;
    }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #9ca3af;
      word-break: break-word;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
      color: #cbd5e1;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="banner">We win by helping others win.</div>

  <div id="ui">
    <h1>Local OBJ Viewer</h1>

    <div id="dropZone">
      Drag .obj here<br />
      or use the file picker below
    </div>

    <div class="row">
      <input id="fileInput" type="file" accept=".obj" />
    </div>

    <div class="row">
      <button id="fitBtn">Fit View</button>
      <button id="resetBtn" class="secondary">Reset Scene</button>
      <button id="bgBtn" class="secondary">Toggle BG</button>
    </div>

    <label>
      <input type="checkbox" id="wireframeToggle" />
      Wireframe
    </label>

    <label>
      <input type="checkbox" id="edgesToggle" checked />
      Show edges
    </label>

    <div id="status">No model loaded.</div>

    <div id="help">
      Mouse:
      <br>• Left drag = orbit
      <br>• Right drag = pan
      <br>• Wheel = zoom
    </div>
  </div>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

  <script>
    const statusEl = document.getElementById('status');
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const fitBtn = document.getElementById('fitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bgBtn = document.getElementById('bgBtn');
    const wireframeToggle = document.getElementById('wireframeToggle');
    const edgesToggle = document.getElementById('edgesToggle');

    let bgDark = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      10000
    );
    camera.position.set(120, 100, 160);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.1);
    dir1.position.set(150, 200, 100);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dir2.position.set(-120, 80, -90);
    scene.add(dir2);

    const grid = new THREE.GridHelper(300, 30, 0x334155, 0x1f2937);
    scene.add(grid);

    const axes = new THREE.AxesHelper(80);
    scene.add(axes);

    let currentModel = null;

    function disposeHierarchy(obj) {
      obj.traverse((child) => {
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose());
          } else {
            child.material.dispose();
          }
        }
      });
    }

    function clearCurrentModel() {
      if (currentModel) {
        scene.remove(currentModel);
        disposeHierarchy(currentModel);
        currentModel = null;
      }
    }

    function rebuildModelAppearance() {
      if (!currentModel) return;

      currentModel.traverse((child) => {
        if (!child.isMesh) return;

        while (child.children.length > 0) {
          const c = child.children[0];
          child.remove(c);
        }

        child.material = new THREE.MeshStandardMaterial({
          color: 0xbfc7d5,
          metalness: 0.15,
          roughness: 0.65,
          wireframe: wireframeToggle.checked
        });

        if (edgesToggle.checked) {
          const edgeGeo = new THREE.EdgesGeometry(child.geometry);
          const edgeMat = new THREE.LineBasicMaterial({ color: 0x111111 });
          const edgeLines = new THREE.LineSegments(edgeGeo, edgeMat);
          child.add(edgeLines);
        }
      });
    }

    function fitCameraToObject(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
      cameraZ *= 1.8;

      camera.position.set(
        center.x + cameraZ * 0.9,
        center.y + cameraZ * 0.7,
        center.z + cameraZ
      );

      controls.target.copy(center);
      controls.update();

      camera.near = Math.max(0.1, maxDim / 1000);
      camera.far = Math.max(1000, maxDim * 20);
      camera.updateProjectionMatrix();
    }

    function loadOBJText(text, name) {
      clearCurrentModel();

      try {
        const loader = new THREE.OBJLoader();
        const object = loader.parse(text);

        currentModel = object;
        rebuildModelAppearance();
        scene.add(currentModel);
        fitCameraToObject(currentModel);

        statusEl.textContent = 'Loaded: ' + name;
      } catch (err) {
        console.error(err);
        statusEl.textContent = 'Failed to load OBJ: ' + err.message;
      }
    }

    function handleFile(file) {
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.obj')) {
        statusEl.textContent = 'Only .obj files are supported.';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        loadOBJText(e.target.result, file.name);
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', function(e) {
      handleFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    });

    fitBtn.addEventListener('click', function() {
      if (currentModel) fitCameraToObject(currentModel);
    });

    resetBtn.addEventListener('click', function() {
      clearCurrentModel();
      statusEl.textContent = 'Scene reset. No model loaded.';
    });

    bgBtn.addEventListener('click', function() {
      bgDark = !bgDark;
      scene.background = new THREE.Color(bgDark ? 0x0b0f14 : 0xe5e7eb);
    });

    wireframeToggle.addEventListener('change', function() {
      rebuildModelAppearance();
    });

    edgesToggle.addEventListener('change', function() {
      rebuildModelAppearance();
    });

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
